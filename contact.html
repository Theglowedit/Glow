<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact — Glow Edit</title>
<meta name="description" content="Get in touch with Glow Edit.">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ccircle cx='50' cy='50' r='48' fill='%23B5546B'/%3E%3Ctext x='50' y='66' font-family='Georgia,serif' font-size='52' font-style='italic' fill='white' text-anchor='middle'%3EG%3C/text%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,500;0,600;0,700;1,500;1,600&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root{--ink:#2A1F22; --rose-deep:#B5546B; --rose-light:#F6DCDF; --cream:#FBF5EF; --line:rgba(42,31,34,0.12);}
  *{box-sizing:border-box; margin:0; padding:0;}
  body{background:var(--cream); color:var(--ink); font-family:'Jost', sans-serif; line-height:1.7;}
  a{color:var(--rose-deep); text-decoration:none;}
  a:hover{text-decoration:underline;}
  h1{font-family:'Fraunces', serif; font-weight:600;}
  .wrap{max-width:720px; margin:0 auto; padding:60px 28px 100px;}
  header{border-bottom:1px solid var(--line); padding:20px 28px;}
  .logo{font-family:'Fraunces', serif; font-style:italic; font-weight:600; font-size:24px; max-width:1100px; margin:0 auto; display:block;}
  .logo span{color:var(--rose-deep); font-style:normal;}
  h1{font-size:36px; font-style:italic; margin-bottom:20px;}
  p{font-size:15px; color:#4a3d42; margin-bottom:16px;}
  .back{display:inline-block; margin-bottom:30px; font-size:13px; letter-spacing:0.04em; text-transform:uppercase;}
  .contact-box{background:#fff; border:1px solid var(--line); border-radius:10px; padding:28px; margin-top:20px;}
  .contact-box p{margin-bottom:10px;}
  .contact-box strong{color:var(--ink);}
</style>
</head>
<body>
<header><a href="index.html" class="logo">Glow <span>Edit</span></a></header>
<div class="wrap">
  <a href="index.html" class="back">&larr; Back to home</a>
  <h1>Contact</h1>
  <p>Questions, collaborations, or feedback — reach out anytime.</p>
  <div class="contact-box">
    <!-- REPLACE with your real email and social links -->
    <p><strong>Email:</strong> your-email@example.com</p>
    <p><strong>Pinterest:</strong> <a href="#">@yourprofile</a></p>
  </div>
</div>
</body>
</html>
